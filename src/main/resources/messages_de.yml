# ========================================
# ChristmasSeason Plugin - Deutsche Texte
# ========================================

# Allgemein
prefix: "&b[Xmas]&7"
no-permission: "&cKeine Berechtigung."

# Commands - /xmas
command:
  usage: "&b/xmas &7<on|off|status|reload|biome|storm>"

  # ON (Quotes needed because YAML interprets 'on' as boolean)
  "on":
    success: "&aEvent aktiviert. &7(Schnee-Features laufen wieder)"

  # OFF (Quotes needed because YAML interprets 'off' as boolean)
  "off":
    cleanup: "&7Entferne Event-Entities & Items..."
    success: "&cEvent deaktiviert. &7(Biome & Schnee werden in Batches zurückgesetzt)"

  # STATUS
  status:
    message: "&bStatus: {0} &7| Schneesturm: {1}"
    active: "&aAN"
    inactive: "&cAUS"

  # RELOAD
  reload:
    success: "&aConfig neu geladen."

  # BIOME
  biome:
    usage: "&b/xmas biome &7<set|restore|clearsnap|status>"

    set:
      usage: "&b/xmas biome set &e<BIOME> &7[radius_chunks]"
      unknown-biome: "&cUnbekanntes Biome."
      invalid-radius: "&cUngültige Zahl für Radius."
      success: "&aBiome gesetzt: &e{0} &7Chunk(s)."

    restore:
      success: "&aBiome auf Seed zurückgesetzt: &e{0} &7Chunk(s)."

    clearsnap:
      success: "&aSnapshot gelöscht."

    status:
      message: "&bBiomeSnapshot: &e{0} &7aktiv"

  # STORM
  storm:
    usage: "&b/xmas storm &7<on|off|toggle|status|pulse>"

    "on": "&bSchneesturm: &aAN"
    "off": "&bSchneesturm: &cAUS"
    toggle: "&bSchneesturm: {0}"
    status: "&bSchneesturm: {0}"

    pulse:
      success: "&bSchneesturm: &e{0}&7s Impuls."
      invalid-duration: "&cUngültige Zahl für Sekunden."
      world-not-found: "&cZielwelt nicht gefunden."

# Commands - /xmasgift
gift:
  spawned: "&aGeschenk gespawnt!"

# Entity Namen
entity:
  wichtel: "&aWichtel"
  elf: "&bElf"
  snowman: "&fSchneemann"
  decoration: "&aWeihnachts-Deko"
  gift-chest: "&c&lWeihnachts-Geschenk"

# Broadcast-Nachrichten
broadcast:
  gift-spawned: "&c🎁 Ein Weihnachts-Geschenk ist in &e{0} &cbei &e{1} {2} {3} &cerschienen!"

